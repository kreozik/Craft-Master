services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: handmade_market
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d handmade_market"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:

